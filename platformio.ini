[env:m5stack-atoms3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = m5stack-atoms3
framework = arduino

; ボード JSON の extra_flags を置換して ARDUINO_USB_MODE を 0 に上書きする
; (build_flags での上書きは重複定義警告が出るため board_build.extra_flags を使う)
board_build.extra_flags =
    -DARDUINO_M5Stack_ATOMS3
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1

build_flags =
    -Wno-deprecated-declarations  ; M5Unified 内の deprecated API 使用警告を抑制
    -Wno-cpp                       ; M5Unified 内の #warning ディレクティブを抑制

lib_deps =
    m5stack/M5Unified@^0.1.16

upload_speed = 1500000
monitor_speed = 115200

